name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      # Lockfile is generated with npm 10 (Node 22 default). npm 11 can emit
      # optional-peer entries that make `npm ci` fail with Missing: lru-cache@…
      - run: npm install -g npm@10
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  e2e:
    runs-on: windows-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm install -g npm@10
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install chromium
      - name: Run e2e smoke tests
        run: npm run test:e2e
